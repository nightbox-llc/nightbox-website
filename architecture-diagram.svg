<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#14161c"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6b5bff"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="redOrange" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b5bff"/>
    </marker>
  </defs>

  <rect width="1200" height="600" fill="url(#bg)"/>

  <!-- Title -->
  <text x="600" y="50" font-family="Inter,Arial,sans-serif" font-size="28" font-weight="800" fill="#f0f1f5" text-anchor="middle">NKG2D-LIF6 Chimeric Receptor-Effector Architecture</text>
  <text x="600" y="80" font-family="JetBrains Mono,monospace" font-size="14" fill="#9ea2ab" text-anchor="middle">2,123 bp · single AAV9 payload · no autologous cell processing</text>

  <!-- Construct map (linear DNA representation) -->
  <g transform="translate(100,140)">
    <text x="0" y="-10" font-family="JetBrains Mono,monospace" font-size="12" fill="#9ea2ab">5' ─────  CONSTRUCT MAP  ───── 3'</text>

    <!-- 5' ITR -->
    <rect x="0" y="0" width="60" height="40" fill="#3a3d45" rx="4"/>
    <text x="30" y="25" font-family="JetBrains Mono,monospace" font-size="11" fill="#cfd2d7" text-anchor="middle">5' ITR</text>

    <!-- CAG promoter -->
    <rect x="65" y="0" width="120" height="40" fill="#22d3ee" rx="4" opacity="0.8"/>
    <text x="125" y="25" font-family="JetBrains Mono,monospace" font-size="11" fill="#0a0a0f" text-anchor="middle" font-weight="600">CAG promoter</text>

    <!-- NKG2D ECD -->
    <rect x="190" y="0" width="240" height="40" fill="url(#purple)" rx="4" filter="url(#glow)"/>
    <text x="310" y="20" font-family="Inter,sans-serif" font-size="13" fill="#fff" text-anchor="middle" font-weight="700">NKG2D ECD</text>
    <text x="310" y="34" font-family="JetBrains Mono,monospace" font-size="9" fill="#fff" text-anchor="middle">414 bp · res 79-216</text>

    <!-- P2A linker -->
    <rect x="435" y="0" width="50" height="40" fill="#9ea2ab" rx="4"/>
    <text x="460" y="25" font-family="JetBrains Mono,monospace" font-size="10" fill="#0a0a0f" text-anchor="middle" font-weight="600">P2A</text>

    <!-- LIF6 effector -->
    <rect x="490" y="0" width="380" height="40" fill="url(#redOrange)" rx="4" filter="url(#glow)"/>
    <text x="680" y="20" font-family="Inter,sans-serif" font-size="13" fill="#fff" text-anchor="middle" font-weight="700">Elephant LIF6 effector</text>
    <text x="680" y="34" font-family="JetBrains Mono,monospace" font-size="9" fill="#fff" text-anchor="middle">1,512 bp · re-functionalized pseudogene · mito-localized</text>

    <!-- polyA -->
    <rect x="875" y="0" width="60" height="40" fill="#22d3ee" rx="4" opacity="0.8"/>
    <text x="905" y="25" font-family="JetBrains Mono,monospace" font-size="11" fill="#0a0a0f" text-anchor="middle" font-weight="600">polyA</text>

    <!-- 3' ITR -->
    <rect x="940" y="0" width="60" height="40" fill="#3a3d45" rx="4"/>
    <text x="970" y="25" font-family="JetBrains Mono,monospace" font-size="11" fill="#cfd2d7" text-anchor="middle">3' ITR</text>

    <!-- Total length -->
    <line x1="0" y1="58" x2="1000" y2="58" stroke="#6b5bff" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="500" y="74" font-family="JetBrains Mono,monospace" font-size="11" fill="#22d3ee" text-anchor="middle">2,123 bp total</text>
  </g>

  <!-- Mechanism flow -->
  <g transform="translate(0,280)">
    <text x="600" y="0" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="700" fill="#f0f1f5" text-anchor="middle">Mechanism in vivo</text>

    <!-- Step 1: AAV9 delivery -->
    <g transform="translate(80,40)">
      <circle cx="80" cy="80" r="60" fill="none" stroke="#22d3ee" stroke-width="2"/>
      <text x="80" y="70" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="#22d3ee" text-anchor="middle">STEP 1</text>
      <text x="80" y="88" font-family="Inter,sans-serif" font-size="13" fill="#fff" text-anchor="middle" font-weight="600">AAV9 delivery</text>
      <text x="80" y="104" font-family="Inter,sans-serif" font-size="10" fill="#9ea2ab" text-anchor="middle">IV systemic</text>
    </g>

    <!-- Arrow 1->2 -->
    <line x1="240" y1="120" x2="290" y2="120" stroke="#6b5bff" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- Step 2: Construct expression -->
    <g transform="translate(290,40)">
      <circle cx="80" cy="80" r="60" fill="none" stroke="#6b5bff" stroke-width="2"/>
      <text x="80" y="70" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="#6b5bff" text-anchor="middle">STEP 2</text>
      <text x="80" y="88" font-family="Inter,sans-serif" font-size="13" fill="#fff" text-anchor="middle" font-weight="600">Express chimera</text>
      <text x="80" y="104" font-family="Inter,sans-serif" font-size="10" fill="#9ea2ab" text-anchor="middle">CAG-driven, all cells</text>
    </g>

    <!-- Arrow 2->3 -->
    <line x1="450" y1="120" x2="500" y2="120" stroke="#6b5bff" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- Step 3: Tumor-only ligand bind -->
    <g transform="translate(500,40)">
      <circle cx="80" cy="80" r="60" fill="none" stroke="#a855f7" stroke-width="2"/>
      <text x="80" y="70" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="#a855f7" text-anchor="middle">STEP 3</text>
      <text x="80" y="88" font-family="Inter,sans-serif" font-size="13" fill="#fff" text-anchor="middle" font-weight="600">NKG2D binds</text>
      <text x="80" y="104" font-family="Inter,sans-serif" font-size="10" fill="#9ea2ab" text-anchor="middle">MICA/B on tumor</text>
    </g>

    <!-- Arrow 3->4 -->
    <line x1="660" y1="120" x2="710" y2="120" stroke="#6b5bff" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- Step 4: LIF6 cleaved + activated -->
    <g transform="translate(710,40)">
      <circle cx="80" cy="80" r="60" fill="none" stroke="#f59e0b" stroke-width="2"/>
      <text x="80" y="70" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="#f59e0b" text-anchor="middle">STEP 4</text>
      <text x="80" y="88" font-family="Inter,sans-serif" font-size="13" fill="#fff" text-anchor="middle" font-weight="600">LIF6 deploys</text>
      <text x="80" y="104" font-family="Inter,sans-serif" font-size="10" fill="#9ea2ab" text-anchor="middle">Mito localization</text>
    </g>

    <!-- Arrow 4->5 -->
    <line x1="870" y1="120" x2="920" y2="120" stroke="#6b5bff" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- Step 5: Apoptosis -->
    <g transform="translate(920,40)">
      <circle cx="80" cy="80" r="60" fill="#ef4444" opacity="0.2" stroke="#ef4444" stroke-width="2"/>
      <text x="80" y="70" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="#ef4444" text-anchor="middle">STEP 5</text>
      <text x="80" y="88" font-family="Inter,sans-serif" font-size="13" fill="#fff" text-anchor="middle" font-weight="600">Apoptosis</text>
      <text x="80" y="104" font-family="Inter,sans-serif" font-size="10" fill="#9ea2ab" text-anchor="middle">Tumor cell only</text>
    </g>
  </g>

  <!-- Footer / metrics -->
  <g transform="translate(0,520)">
    <text x="200" y="0" font-family="Inter,sans-serif" font-size="22" fill="url(#purple)" text-anchor="middle" font-weight="800">~99%</text>
    <text x="200" y="22" font-family="JetBrains Mono,monospace" font-size="10" fill="#9ea2ab" text-anchor="middle">Predicted TGI ceiling, CRC</text>

    <text x="500" y="0" font-family="Inter,sans-serif" font-size="22" fill="url(#purple)" text-anchor="middle" font-weight="800">1.4 × 10³</text>
    <text x="500" y="22" font-family="JetBrains Mono,monospace" font-size="10" fill="#9ea2ab" text-anchor="middle">Tumor : healthy selectivity</text>

    <text x="800" y="0" font-family="Inter,sans-serif" font-size="22" fill="url(#purple)" text-anchor="middle" font-weight="800">SINGLE</text>
    <text x="800" y="22" font-family="JetBrains Mono,monospace" font-size="10" fill="#9ea2ab" text-anchor="middle">construct, no autologous cells</text>

    <text x="1050" y="0" font-family="Inter,sans-serif" font-size="22" fill="url(#purple)" text-anchor="middle" font-weight="800">CLEAN</text>
    <text x="1050" y="22" font-family="JetBrains Mono,monospace" font-size="10" fill="#9ea2ab" text-anchor="middle">IP whitespace, FTO done</text>
  </g>

  <text x="600" y="585" font-family="Inter,sans-serif" font-size="11" fill="#6b6f78" text-anchor="middle">© 2026 Nightbox LLC · nightboxllc.com</text>
</svg>
